<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unstable Tiers</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(180deg,#060814,#0e1324);
color:white;
}

/* HEADER */

.hero{
max-width:1100px;
margin:40px auto;
padding:30px;
display:flex;
gap:20px;
align-items:center;
background:#12172a;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.hero img{
width:120px;
border-radius:20px;
}

.hero h1{
font-size:40px;
background:linear-gradient(90deg,#ff4fd8,#58a6ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:6px;
color:#aeb7d7;
}

.discord{
margin-top:12px;
display:inline-block;
background:#5865F2;
padding:10px 18px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:30px;
}

.tabs button{
background:#1b2238;
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.tabs button.active{
background:linear-gradient(90deg,#ff4fd8,#58a6ff);
}

/* PANELS */

.panel{
display:none;
max-width:1000px;
margin:auto;
padding:10px;
}

.panel.active{
display:block;
}

/* PLAYER CARD */

.player{
display:flex;
align-items:center;
justify-content:space-between;
background:#161c2f;
border-radius:12px;
padding:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,.05);
}

.left{
display:flex;
align-items:center;
gap:14px;
}

.player img{
width:46px;
height:46px;
border-radius:8px;
image-rendering:pixelated;
}

.name{
font-weight:bold;
}

.meta{
font-size:13px;
color:#aeb7d7;
}

.rank{
background:#232b44;
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.empty{
text-align:center;
padding:40px;
color:#aeb7d7;
}

</style>
</head>

<body>

<div class="hero">

<img src="https://media.discordapp.net/attachments/1482589653805699213/1482642012015558656/Untitled_design_5.png">

<div>
<h1>Unstable Tiers</h1>
<p>Leaderboard for SMP and Mace testing</p>

<a class="discord" href="https://discord.gg/7MCYPH5sdE" target="_blank">
Join Discord
</a>

</div>

</div>

<div class="tabs">

<button class="tab active" onclick="tab('leaderboard',this)">Leaderboard</button>
<button class="tab" onclick="tab('smp',this)">SMP</button>
<button class="tab" onclick="tab('mace',this)">Mace</button>

</div>

<div id="leaderboard" class="panel active">
<div id="leaderboardList"></div>
</div>

<div id="smp" class="panel">
<div id="smpList"></div>
</div>

<div id="mace" class="panel">
<div id="maceList"></div>
</div>

<script>

let data=[]

function head(name){
return `https://mc-heads.net/avatar/${name}/100`
}

function tab(id,btn){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")
btn.classList.add("active")

}

function render(){

const players={}
const smp=[]
const mace=[]

data.forEach(r=>{

if(!players[r.username]){
players[r.username]={username:r.username,smp:null,mace:null}
}

if(r.mode==="smp"){
players[r.username].smp=r.rank_earned
smp.push(r)
}

if(r.mode==="mace"){
players[r.username].mace=r.rank_earned
mace.push(r)
}

})

const lb=document.getElementById("leaderboardList")
const smpList=document.getElementById("smpList")
const maceList=document.getElementById("maceList")

const list=Object.values(players)

lb.innerHTML=list.length?list.map(p=>`

<div class="player">

<div class="left">
<img src="${head(p.username)}">

<div>
<div class="name">${p.username}</div>
<div class="meta">SMP: ${p.smp||"Unranked"} • Mace: ${p.mace||"Unranked"}</div>
</div>

</div>

</div>

`).join(""):`<div class="empty">No players yet</div>`


smpList.innerHTML=smp.length?smp.map(r=>`

<div class="player">

<div class="left">
<img src="${head(r.username)}">
<div class="name">${r.username}</div>
</div>

<div class="rank">${r.rank_earned}</div>

</div>

`).join(""):`<div class="empty">No SMP tests</div>`


maceList.innerHTML=mace.length?mace.map(r=>`

<div class="player">

<div class="left">
<img src="${head(r.username)}">
<div class="name">${r.username}</div>
</div>

<div class="rank">${r.rank_earned}</div>

</div>

`).join(""):`<div class="empty">No Mace tests</div>`

}

async function load(){

const r=await fetch("/api/test-result")
data=await r.json()

render()

}

load()
setInterval(load,5000)

</script>

</body>
</html>
