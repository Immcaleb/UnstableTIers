<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unstable Tiers</title>

<style>

body{
    background:#0b0b0b;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
}

header{
    text-align:center;
    padding:40px 20px;
}

.logo{
    font-size:40px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff4fd8,#5aa6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.discord{
    margin-top:15px;
}

.discord a{
    background:#5865F2;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    text-decoration:none;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px;
}

.tab{
    padding:10px 20px;
    background:#111;
    border-radius:10px;
    cursor:pointer;
}

.tab.active{
    background:#222;
}

.container{
    max-width:900px;
    margin:auto;
}

.player{
    display:flex;
    align-items:center;
    background:#111;
    margin:10px;
    padding:12px;
    border-radius:10px;
}

.player img{
    width:40px;
    height:40px;
    border-radius:8px;
    margin-right:12px;
}

.rank{
    margin-left:auto;
    font-weight:bold;
}

</style>
</head>

<body>

<header>

<div class="logo">Unstable Tiers</div>

<div class="discord">
<a href="https://discord.gg/7MCYPH5sdE" target="_blank">Join Discord</a>
</div>

</header>


<div class="tabs">
<div class="tab active" onclick="switchTab('smp')">SMP</div>
<div class="tab" onclick="switchTab('mace')">Mace</div>
</div>


<div class="container" id="list"></div>


<script>

let current="smp"

function switchTab(tab){

current=tab

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(tab==="smp")
document.querySelectorAll(".tab")[0].classList.add("active")
else
document.querySelectorAll(".tab")[1].classList.add("active")

load()

}

async function load(){

const res=await fetch("/api/test-result")
const data=await res.json()

const list=document.getElementById("list")
list.innerHTML=""

const filtered=data.filter(p=>p.mode===current)

filtered.reverse().forEach(player=>{

const div=document.createElement("div")
div.className="player"

div.innerHTML=`
<img src="https://mc-heads.net/avatar/${player.username}">
<div>
<div>${player.username}</div>
<div style="font-size:12px;color:gray">${player.region}</div>
</div>
<div class="rank">${player.rank_earned}</div>
`

list.appendChild(div)

})

}

load()

</script>

</body>
</html>
