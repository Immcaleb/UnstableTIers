<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Unstable Tiers</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b0f1c;
color:white;
}

.header{
display:flex;
align-items:center;
gap:20px;
padding:30px;
background:#12172a;
border-bottom:1px solid #20263b;
}

.logo{
width:90px;
border-radius:10px;
}

.title{
font-size:32px;
font-weight:bold;
}

.discord{
margin-left:auto;
background:#5865F2;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
}

.tabs button{
background:#1a2138;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.tabs button.active{
background:#ff4fd8;
}

.panel{
display:none;
max-width:900px;
margin:auto;
padding:10px;
}

.panel.active{
display:block;
}

.player{
display:flex;
align-items:center;
justify-content:space-between;
background:#161d33;
border-radius:10px;
padding:14px;
margin-bottom:10px;
}

.left{
display:flex;
align-items:center;
gap:14px;
}

.player img{
width:40px;
height:40px;
border-radius:6px;
image-rendering:pixelated;
}

.rank{
background:#2b355e;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
}

.empty{
text-align:center;
padding:30px;
color:#999;
}

</style>
</head>

<body>

<div class="header">

<img class="logo" src="https://media.discordapp.net/attachments/1482589653805699213/1482642012015558656/Untitled_design_5.png">

<div class="title">Unstable Tiers</div>

<a class="discord" href="https://discord.gg/7MCYPH5sdE" target="_blank">
Join Discord
</a>

</div>


<div class="tabs">

<button class="tab active" onclick="tab('leaderboard',this)">Leaderboard</button>
<button class="tab" onclick="tab('smp',this)">SMP</button>
<button class="tab" onclick="tab('mace',this)">Mace</button>

</div>


<div id="leaderboard" class="panel active">
<div id="leaderboardList"></div>
</div>

<div id="smp" class="panel">
<div id="smpList"></div>
</div>

<div id="mace" class="panel">
<div id="maceList"></div>
</div>


<script>

let data=[]

function head(name){
return `https://mc-heads.net/avatar/${name}/40`
}

function tab(id,btn){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")
btn.classList.add("active")

}

function render(){

const leaderboard={}
const smp=[]
const mace=[]

data.forEach(r=>{

if(!leaderboard[r.username]){
leaderboard[r.username]={username:r.username,smp:null,mace:null}
}

if(r.mode==="smp"){
leaderboard[r.username].smp=r.rank_earned
smp.push(r)
}

if(r.mode==="mace"){
leaderboard[r.username].mace=r.rank_earned
mace.push(r)
}

})

const lb=document.getElementById("leaderboardList")
const smpList=document.getElementById("smpList")
const maceList=document.getElementById("maceList")

const players=Object.values(leaderboard)

lb.innerHTML = players.length ? players.map(p=>`
<div class="player">

<div class="left">
<img src="${head(p.username)}">
<div>
<b>${p.username}</b><br>
SMP: ${p.smp||"Unranked"} • Mace: ${p.mace||"Unranked"}
</div>
</div>

</div>
`).join("") : `<div class="empty">No players yet</div>`


smpList.innerHTML = smp.length ? smp.map(r=>`
<div class="player">

<div class="left">
<img src="${head(r.username)}">
<div><b>${r.username}</b></div>
</div>

<div class="rank">${r.rank_earned}</div>

</div>
`).join("") : `<div class="empty">No SMP tests</div>`


maceList.innerHTML = mace.length ? mace.map(r=>`
<div class="player">

<div class="left">
<img src="${head(r.username)}">
<div><b>${r.username}</b></div>
</div>

<div class="rank">${r.rank_earned}</div>

</div>
`).join("") : `<div class="empty">No Mace tests</div>`

}

async function load(){

const r=await fetch("/api/test-result")
data=await r.json()

render()

}

load()

setInterval(load,5000)

</script>

</body>
</html>
