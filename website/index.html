<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unstable Tiers</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f1c;
  color:white;
}

header{
  text-align:center;
  padding:40px;
  font-size:40px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff4fd8,#58a6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.tab{
  background:#1a2033;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

.section{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.active{
  display:block;
}

.card{
  background:#161b2d;
  border-radius:10px;
  padding:15px;
  margin:10px 0;
}

.rank{
  font-weight:bold;
  color:#ffcc66;
}

</style>
</head>

<body>

<header>Unstable Tiers</header>

<div class="tabs">
  <div class="tab" onclick="showTab('leaderboard')">Leaderboard</div>
  <div class="tab" onclick="showTab('smp')">SMP Tiers</div>
  <div class="tab" onclick="showTab('mace')">Mace Tiers</div>
</div>

<div id="leaderboard" class="section active">
<h2>Leader Board</h2>
<div id="players"></div>
</div>

<div id="smp" class="section">
<h2>SMP Tiers</h2>

<div class="card">HT5</div>
<div class="card">LT5</div>
<div class="card">HT4</div>
<div class="card">LT4</div>
<div class="card">HT3</div>
<div class="card">LT3</div>
<div class="card">HT2</div>
<div class="card">LT2</div>
<div class="card">HT1</div>
<div class="card">LT1</div>

</div>

<div id="mace" class="section">
<h2>Mace Tiers</h2>

<div class="card">HT5</div>
<div class="card">LT5</div>
<div class="card">HT4</div>
<div class="card">LT4</div>
<div class="card">HT3</div>
<div class="card">LT3</div>
<div class="card">HT2</div>
<div class="card">LT2</div>
<div class="card">HT1</div>
<div class="card">LT1</div>

</div>

<script>

function showTab(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

async function loadPlayers(){
  const res = await fetch("/api/test-result")
  const data = await res.json()

  const list = document.getElementById("players")
  list.innerHTML=""

  data.forEach(p=>{
    const el=document.createElement("div")
    el.className="card"
    el.innerHTML=`
      <b>${p.username}</b><br>
      Mode: ${p.mode}<br>
      Rank: <span class="rank">${p.rank_earned}</span>
    `
    list.appendChild(el)
  })
}

loadPlayers()
setInterval(loadPlayers,5000)

</script>

</body>
</html>
